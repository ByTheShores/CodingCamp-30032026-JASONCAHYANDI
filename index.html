<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Budget Spender Web</title>
        <script src="https://kit.fontawesome.com/05e80468d8.js" crossorigin="anonymous"></script>

        <link rel="stylesheet" href="style.css">
    </head>

    <body class="">

        <section id="header">
            <div>
                <h2>Expense & Budget Visualizer</h2>
            </div>
            <button id="theme-switch">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
            </button>
        </section>

        
        <section id="feature" class="section-p1">
            <div class="fe-box">
                <h4>TOTAL BALANCE</h4>
                <h1 id="total-balance">$0</h1>
            </div>
        </section>

        <section id="adder" class="section-p1">
            <div class="fe-box">
                <h4>Add Transaction</h4>
                <label for="ItemName"><h8>Item Name</h8></label>
                <input class="input-box" type="text" placeholder=" Enter Item Name" id="ItemName" required>
                <label for="ItemName"><h8>Amount</h8></label>
                <input class="input-box" type="text" placeholder=" Enter Amount" id="Amount" required>
                <label for="ItemName"><h8>Category</h8></label>
                <input class="input-box" type="text" placeholder=" Enter Category" id="Category" required>
                <button class="blue">Add Transaction</button>
                <label for="SpendingLimit"><h8>Spending Limit</h8></label>
                <input class="input-box" type="text" placeholder=" Enter Spending Limit" id="SpendingLimit" required>
            </div>
        </section>
        
        <div class="side-by-side">
        <section id="tlist" class="section-p1">
            <div class="fe-box">
                <div class="tlist-header">
                    <h4>Transaction</h4>
                    <div class="sort-buttons">
                        <h6>Sort by:</h6>
                        <button id="sort-category">Category</button>
                        <button id="sort-amount">Amount</button>
                    </div>
                </div>
                <ul id="transaction-list"></ul>
            </div>
        </section>

        <section id="pchart" class="section-p1">
            <div class="fe-box">
                <h4>Spending by Category</h4>
                <canvas id="pie-chart"></canvas>
            </div>
        </section>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js"></script>
</html>
